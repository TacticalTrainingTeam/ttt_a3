name: Publish Release Notes to Discord

on:
  release:
    types: [published]

jobs:
  github-releases-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        
      - name: Github Releases To Discord
        uses: SethCohen/github-releases-to-discord@v1.20.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: "TTT-Mod Release Changelog"
          avatar_url: "https://wiki.tacticalteam.de/bilder/ttt_logo_heagon_512x512.png"
          content: ""
          footer_title: "TTT-Mod"
          footer_icon_url: "https://wiki.tacticalteam.de/bilder/ttt_logo_heagon_512x512.png"
          footer_timestamp: true
